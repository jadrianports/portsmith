# Supabase CLI local project configuration.
# Authored for Portsmith Phase 1 (Plan 01-05). Mirrors the standard
# `supabase init` template. The local stack is APPLIED in Plan 01-08 (which
# requires Docker); this file only declares the local project config.
#
# A string used to distinguish different Supabase projects on the same host.
# Defaults to the working directory name when running `supabase init`.
project_id = "portsmith"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this
# schema will get API endpoints. `public` and `graphql_public` schemas are
# included by default.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returned from a view, table, or stored procedure.
# Limits payload size for accidental or malicious requests.
max_rows = 1000

[api.tls]
enabled = false

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# The database major version to use. This has to be the same as your remote
# database's. Run `SHOW server_version;` on the remote database to check.
major_version = 15

[db.pooler]
enabled = false
# Port to use for the local connection pooler.
port = 54329
# Specifies when a server connection can be reused by other clients.
# Configure one of the supported pooler modes: `transaction`, `session`.
pool_mode = "transaction"
# How many server connections to allow per user/database pair.
default_pool_size = 20
# Maximum number of client connections allowed.
max_client_conn = 100

[db.migrations]
# If disabled, migrations will be skipped during a db push or reset.
enabled = true

[db.seed]
# If enabled, seeds the database after migrations during a db reset.
enabled = true
# Specifies an ordered list of seed files to load during db reset.
# Supports glob patterns relative to supabase directory: './seeds/*.sql'
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"

# Email testing server. Emails sent with the local dev setup are not actually
# sent - rather, they are monitored, and you can view the emails that would have
# been sent from the web interface.
[inbucket]
enabled = true
# Port to use for the email testing server web interface.
port = 54324

[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MiB"

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for
# constructing URLs used in emails.
site_url = "http://127.0.0.1:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to
# post authentication. The `/auth/confirm` entries are the token_hash
# confirm/recovery landing path (Pitfall 1 / AUTH-06); both the site_url origin
# (127.0.0.1) and the NEXT_PUBLIC_SITE_URL origin (localhost) are allow-listed so
# either dev origin can complete confirm/reset. T-02-04: this allowlist is the
# open-redirect boundary; the Wave-2 confirm route additionally constrains `next`.
#
# WR-02: the first entry was `https://127.0.0.1:3000` (TLS) — the dev server runs
# plain http ([api.tls] enabled = false), so a TLS origin matched nothing the app
# emits. Corrected to the bare http origin (the site_url / NEXT_PUBLIC_SITE_URL
# origin), so a redirect to the origin without the /auth/confirm suffix is also
# covered alongside the two explicit /auth/confirm landing paths.
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3000/auth/confirm",
  "http://localhost:3000/auth/confirm",
]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum
# 604,800 (1 week).
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified interval
# in seconds. Requires enable_refresh_token_rotation = true.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project.
enable_signup = true

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the
# old, and new email addresses. If disabled, only the new email is required to
# confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
# AUTH-02 / AUTH-06: email confirmation is the auth gate — users must click the
# token_hash link before they can act as confirmed.
enable_confirmations = true

# Confirm-signup and Reset-password email templates (Pitfall 1 / Pitfall 2 / A4).
# Both templates emit the token_hash form pointing at /auth/confirm so the
# Wave-2 route exchanges the token via `verifyOtp` (NOT the PKCE `?code=` /
# `exchangeCodeForSession` path, and NOT `{{ .ConfirmationURL }}`). T-02-03:
# token_hash is single-use + server-verified.
[auth.email.template.confirmation]
subject = "Confirm your Portsmith account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Portsmith password"
content_path = "./supabase/templates/recovery.html"

# Use an external OAuth provider. The full list of providers are:
# `apple`, `azure`, `bitbucket`, `discord`, `facebook`, `github`, `gitlab`,
# `google`, `keycloak`, `linkedin_oidc`, `notion`, `twitch`, `twitter`,
# `slack`, `spotify`, `workos`, `zoom`.
[auth.external.apple]
enabled = false

[analytics]
enabled = false
