name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint, build, unit + RLS integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GitHub-hosted ubuntu runners ship Docker, so the local Supabase stack
      # boots here. Local dev needs Docker Desktop (see 01-VALIDATION.md).
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      # Applies migrations + seed.sql once they exist (Plans 05/06/etc.).
      - name: Reset database (apply migrations + seed)
        run: supabase db reset

      # Export the local stack's URL + keys so the Vitest integration project and
      # tests/integration/_setup.ts can reach it (same env vars they read locally).
      - name: Export local Supabase env
        run: supabase status -o env >> "$GITHUB_ENV"

      # D-P10-01a build-ordering fix: the build-dependent gates
      # (`tests/build/route-table-ssg.test.ts`, `npm run check:bundle`) read the
      # production `.next/` prerender + chunk manifests, and route-table-ssg loud-fails
      # when the build is absent. It lives in the Vitest `unit` project glob
      # (vitest.config.ts: `tests/build/**`), so the unscoped `npx vitest run` used
      # to run it BEFORE the build below — failing on a clean checkout. Run the
      # NON-build tests first (integration + unit minus tests/build), then build,
      # then the build-artifact gates. RESEARCH §Pitfall 2 sequence.
      - name: Run tests (unit + RLS integration, excluding build-artifact gates)
        run: npx vitest run --project unit --project integration --exclude 'tests/build/**'

      # FND-05 bundle-scan proof. Build the app, then assert the service-role
      # key VALUE never appears anywhere under .next/static (the client bundle).
      # The `import 'server-only'` guard in src/lib/supabase/service-role.ts is
      # the compile-time wall; this grep is the regression backstop.
      #
      # `next build` needs the PUBLIC env to succeed and produce .next/static.
      # The "Export local Supabase env" step above wrote the local stack's
      # SUPABASE_URL / SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY into
      # $GITHUB_ENV (the same names tests/integration/_setup.ts reads). Map the
      # public values onto the NEXT_PUBLIC_* names Next reads at build time, and
      # pass the service-role key in so it has a real chance to leak — which is
      # exactly what the next step proves it does NOT do.
      #
      # This step ALSO produces the `.next/` manifests the build-artifact gates
      # below read — so it MUST run before them (D-P10-01a).
      - name: Build app (produces .next/static for the bundle scan + .next manifests for the build gates)
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}

      # Build-artifact gates: now that `.next/` exists they evaluate a REAL build.
      # route-table-ssg (D-22 SSG/ISR proof) reads .next/prerender-manifest.json;
      # check:bundle reuses the build just produced (`--skip-build`, no double build).
      - name: Run build-artifact gates (D-22 SSG proof + bundle budget)
        run: |
          npx vitest run --project unit tests/build
          npm run check:bundle -- --skip-build

      - name: Assert service-role key absent from client bundle
        run: |
          if grep -rqF "$SUPABASE_SERVICE_ROLE_KEY" .next/static; then
            echo "::error::service-role key found in client bundle (.next/static) — FND-05 violation"
            exit 1
          fi
          echo "FND-05 OK: service-role key absent from .next/static"
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
