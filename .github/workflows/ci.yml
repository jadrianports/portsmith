name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint, build, unit + RLS integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GitHub-hosted ubuntu runners ship Docker, so the local Supabase stack
      # boots here. Local dev needs Docker Desktop (see 01-VALIDATION.md).
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      # Applies migrations + seed.sql once they exist (Plans 05/06/etc.).
      - name: Reset database (apply migrations + seed)
        run: supabase db reset

      # Export the local stack's URL + keys so the Vitest integration project and
      # tests/integration/_setup.ts can reach it (same env vars they read locally).
      - name: Export local Supabase env (mapped to the names the app + tests read)
        run: |
          # `supabase status -o env` (CLI `latest`) emits API_URL / ANON_KEY /
          # SERVICE_ROLE_KEY — NOT the SUPABASE_* names the app + tests/integration read.
          # The old one-line `>> $GITHUB_ENV` wrote the WRONG names, so every downstream
          # `${{ env.SUPABASE_URL }}` was blank → the whole integration suite failed with
          # "Missing env var SUPABASE_URL" and `next build` got an empty NEXT_PUBLIC_*.
          # Map explicitly so a future CLI output-name drift can't silently blank it again.
          eval "$(supabase status -o env)"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
          } >> "$GITHUB_ENV"

      # D-P10-01a build-ordering fix: the build-dependent gates
      # (`tests/build/route-table-ssg.test.ts`, `npm run check:bundle`) read the
      # production `.next/` prerender + chunk manifests, and route-table-ssg loud-fails
      # when the build is absent. It lives in the Vitest `unit` project glob
      # (vitest.config.ts: `tests/build/**`), so the unscoped `npx vitest run` used
      # to run it BEFORE the build below — failing on a clean checkout. Run the
      # NON-build tests first (integration + unit minus tests/build), then build,
      # then the build-artifact gates. RESEARCH §Pitfall 2 sequence.
      - name: Run tests (unit + RLS integration, excluding build-artifact gates)
        run: npx vitest run --project unit --project integration --exclude 'tests/build/**'

      # FND-05 bundle-scan proof. Build the app, then assert the service-role
      # key VALUE never appears anywhere under .next/static (the client bundle).
      # The `import 'server-only'` guard in src/lib/supabase/service-role.ts is
      # the compile-time wall; this grep is the regression backstop.
      #
      # `next build` needs the PUBLIC env to succeed and produce .next/static.
      # The "Export local Supabase env" step above wrote the local stack's
      # SUPABASE_URL / SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY into
      # $GITHUB_ENV (the same names tests/integration/_setup.ts reads). Map the
      # public values onto the NEXT_PUBLIC_* names Next reads at build time, and
      # pass the service-role key in so it has a real chance to leak — which is
      # exactly what the next step proves it does NOT do.
      #
      # This step ALSO produces the `.next/` manifests the build-artifact gates
      # below read — so it MUST run before them (D-P10-01a).
      - name: Build app (produces .next/static for the bundle scan + .next manifests for the build gates)
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}

      # Build-artifact gates: now that `.next/` exists they evaluate a REAL build.
      # route-table-ssg (D-22 SSG/ISR proof) reads .next/prerender-manifest.json;
      # check:bundle reuses the build just produced (`--skip-build`, no double build).
      # `route-table-ssg.test.ts` asserts the FOUNDER's prerendered blog instances
      # (jadrianports + npm-run-seed:founder posts) — gitignored content CI can't seed, so it's
      # excluded here and runs LOCALLY pre-push (the B-scoping decision). The other build tests
      # (landing-ssg, preview-bridge-chunk) + check:bundle are founder-independent.
      - name: Run build-artifact gates (bundle budget + founder-independent SSG checks)
        run: |
          npx vitest run --project unit tests/build --exclude '**/route-table-ssg.test.ts'
          npm run check:bundle -- --skip-build

      - name: Assert service-role key absent from client bundle
        run: |
          # WR-04: guard the empty-key case BEFORE the grep. `grep -F ""` matches every
          # line of every file, so an empty/unset SUPABASE_SERVICE_ROLE_KEY would make the
          # `if` body run and hard-fail with a misleading "key found in client bundle"
          # error — a false BLOCKER masking the real problem (the key was simply absent).
          # An empty key also makes the scan meaningless (it can never prove absence), so
          # the FND-05 backstop must assert the key is present before scanning.
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY is empty — cannot run the FND-05 bundle scan"
            exit 1
          fi
          if grep -rqF "$SUPABASE_SERVICE_ROLE_KEY" .next/static; then
            echo "::error::service-role key found in client bundle (.next/static) — FND-05 violation"
            exit 1
          fi
          echo "FND-05 OK: service-role key absent from .next/static"
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}

  # ── TEMPLATE GATE (D-P10-01 mirror) ───────────────────────────────────────────
  # The `gate:template` umbrella (scripts/gate-template.mjs) is the LOCAL source of
  # truth (D-P10-01); THIS job is its CI BACKSTOP MIRROR, running the SAME `gate:*`
  # scripts so local and CI can never diverge (T-10-06-CIMIRROR). It composes every
  # template gate into ONE pipeline that blocks on any single failure (CICD-01).
  #
  # REPO: local `main` tracks `origin/main` (jadrianports/portsmith) as a normal repo —
  # `.planning`/`.claude` are gitignored (never in history), so a plain `git push` is safe.
  # This CI mirror fires on every push/PR to that repo. Locally the umbrella IS the gate
  # (run `npm run gate:template`).
  #
  # ORDERING (D-P10-01a): the umbrella runs `tsc -> static -> next build -> build-
  # artifact -> render` IN-PROCESS (scripts/gate-template.mjs owns the order), so the
  # build provably precedes the build-artifact + render gates. The Supabase stack is
  # provisioned + env-mapped here exactly as the `test` job does, because the render
  # tier's Playwright `webServer` (`npm run dev`) needs the local-stack public env.
  template-gate:
    name: Template gate (gate:template umbrella mirror — CICD-01)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The render tier (Playwright) needs a browser; the static + build tiers do not.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # The render gates render the stack-free `/__fixture/<slug>` route (no DB), but
      # `next dev` + `next build` still need the PUBLIC Supabase env to boot/compile.
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Reset database (apply migrations + seed)
        run: supabase db reset

      - name: Export local Supabase env (mapped to the names the app + tests read)
        run: |
          # `supabase status -o env` (CLI `latest`) emits API_URL / ANON_KEY /
          # SERVICE_ROLE_KEY — NOT the SUPABASE_* names the app + tests/integration read.
          # The old one-line `>> $GITHUB_ENV` wrote the WRONG names, so every downstream
          # `${{ env.SUPABASE_URL }}` was blank → the whole integration suite failed with
          # "Missing env var SUPABASE_URL" and `next build` got an empty NEXT_PUBLIC_*.
          # Map explicitly so a future CLI output-name drift can't silently blank it again.
          eval "$(supabase status -o env)"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
          } >> "$GITHUB_ENV"

      # Run the SAME umbrella the operator runs locally. It performs its OWN
      # `next build` (Tier 2) BEFORE the build-artifact + render gates (D-P10-01a),
      # so no separate build step is needed here. Map the public env onto the
      # NEXT_PUBLIC_* names Next reads at build + dev time (same mapping as `test`).
      # GATE_SKIP_FOUNDER_DATA=1 skips the 2 founder-data gates (route-table-ssg + gate:blog-prod)
      # that need `npm run seed:founder` (gitignored content CI can't run). Every other tier —
      # tsc / security / isolation / registry / build / bundle / conformance / a11y / parity —
      # is founder-independent and runs here. Those 2 run LOCALLY pre-push (the B-scoping decision).
      - name: Run gate:template umbrella (founder-independent tiers)
        run: npm run gate:template
        env:
          GATE_SKIP_FOUNDER_DATA: '1'
          # gate:parity = golden SCREENSHOTS captured on Windows; CI is Linux (font antialiasing
          # differs) → skipped here, runs locally pre-push. conformance + a11y still run in CI.
          GATE_SKIP_PARITY: '1'
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}

  # ── PRODUCTION DEPLOY (CI-gated — DEPLOY-01) ──────────────────────────────────
  # The DEPLOY GATE (James's decision): production ships ONLY when BOTH CI jobs are
  # green. `needs: [test, template-gate]` makes this job wait for them; a failure in
  # either skips this job entirely, so a red CI can NEVER reach production — even on a
  # direct push to main. Vercel's own push-triggered auto-deploy is turned OFF in
  # vercel.json (`git.deploymentEnabled.main=false`) so THIS job is the sole deploy path
  # (no ungated double-ship).
  #
  # DEPLOY METHOD — Vercel-SIDE build (not `--prebuilt`): `vercel deploy --prod` uploads
  # the working tree and Vercel runs `next build` in its own env, which is THIS project's
  # proven path (the `.vercelignore` membership gate exists precisely because Vercel
  # uploads the working tree). It also injects the project's Production env vars into the
  # build, so the `prebuild` `check-env.mjs` guard sees them. The earlier `vercel build
  # --prod` (prebuilt) flow FAILED here: `vercel pull` wrote `.vercel/.env.production.local`
  # but `vercel build` does NOT inject those into the prebuild script's process.env, so
  # check-env saw 0 of the 9 required vars. The CLI links to the project via the
  # VERCEL_ORG_ID / VERCEL_PROJECT_ID env vars below (no `vercel pull` needed).
  #
  # Runs only on a real push to main (not PRs, not other branches): a PR validates the
  # two gates without shipping; merging to main is what deploys.
  deploy:
    name: Deploy to Vercel (production — CI-gated)
    needs: [test, template-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy to Vercel production (Vercel-side build, project env injected)
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
